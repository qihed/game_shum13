<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Манифест 2026 — поток будущих медиа</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --pink: #ff1493;
      --cyan: #86d2c5;
      --violet: #ab68e2;
      --blue: #81c4d9;
      --dark: #26264a;
      --white: #ffffff;
      --soft: rgba(255, 255, 255, .78);
      --glass: rgba(255, 255, 255, .10);
      --glass-strong: rgba(255, 255, 255, .18);
      --line: rgba(255, 255, 255, .20);
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: "Montserrat", "Segoe UI", Arial, system-ui, sans-serif;
      color: var(--white);
      background: #070818;
    }

    button {
      font: inherit;
    }

    .stage {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      isolation: isolate;
      background:
        radial-gradient(circle at 12% 20%, rgba(255, 20, 147, .34), transparent 24%),
        radial-gradient(circle at 84% 18%, rgba(134, 210, 197, .26), transparent 25%),
        radial-gradient(circle at 72% 78%, rgba(171, 104, 226, .34), transparent 28%),
        linear-gradient(135deg, #070818 0%, #16164a 44%, #061b2a 100%);
    }

    .stage::before {
      content: "";
      position: absolute;
      inset: -40%;
      z-index: -2;
      background:
        conic-gradient(from 90deg at 50% 50%, rgba(255, 20, 147, .13), rgba(134, 210, 197, .11), rgba(171, 104, 226, .17), rgba(255, 20, 147, .13));
      animation: rotateBg 32s linear infinite;
      filter: blur(2px);
      opacity: .95;
    }

    .stage::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 20;
      pointer-events: none;
      background:
        linear-gradient(rgba(255, 255, 255, .035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, .026) 1px, transparent 1px),
        radial-gradient(circle at 50% 50%, transparent 0 48%, rgba(0, 0, 0, .46) 100%);
      background-size: 42px 42px, 42px 42px, auto;
      mix-blend-mode: screen;
    }

    @keyframes rotateBg {
      to {
        transform: rotate(360deg);
      }
    }

    #particleCanvas {
      position: absolute;
      inset: 0;
      z-index: 1;
      width: 100%;
      height: 100%;
      display: block;
    }

    .ambient-shape {
      position: absolute;
      z-index: 2;
      border: 1px solid rgba(255, 255, 255, .13);
      border-radius: 999px;
      filter: blur(.2px);
      opacity: .55;
      pointer-events: none;
      animation: floatShape 12s ease-in-out infinite alternate;
    }

    .shape-1 {
      width: 34vw;
      height: 34vw;
      left: -12vw;
      top: 10vh;
      background: radial-gradient(circle, rgba(255, 20, 147, .20), transparent 64%);
    }

    .shape-2 {
      width: 24vw;
      height: 24vw;
      right: -7vw;
      top: 7vh;
      background: radial-gradient(circle, rgba(134, 210, 197, .16), transparent 66%);
      animation-delay: -4s;
    }

    .shape-3 {
      width: 30vw;
      height: 30vw;
      right: 12vw;
      bottom: -14vw;
      background: radial-gradient(circle, rgba(171, 104, 226, .20), transparent 63%);
      animation-delay: -8s;
    }

    @keyframes floatShape {
      from {
        transform: translate3d(-1.5vw, -1vh, 0) scale(.98);
      }

      to {
        transform: translate3d(1.8vw, 2.2vh, 0) scale(1.04);
      }
    }

    .topbar {
      position: absolute;
      left: clamp(22px, 4vw, 70px);
      right: clamp(22px, 4vw, 70px);
      top: clamp(18px, 3.2vh, 38px);
      z-index: 30;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 24px;
      pointer-events: none;
    }

    .brand {
      display: grid;
      gap: 22px;
      max-width: min(760px, 70vw);
      transition: opacity .38s ease, visibility .38s ease, transform .38s ease;
    }

    .stage.running .brand {
      opacity: 0;
      visibility: hidden;
      transform: translateY(-18px);
      pointer-events: none;
    }

    .stage.running .topbar {
      justify-content: flex-end;
    }

    .kicker {
      display: inline-flex;
      align-items: center;
      width: max-content;
      gap: 10px;
      padding: 8px 12px;
      border-radius: 999px;
      color: rgba(255, 255, 255, .82);
      background: rgba(255, 255, 255, .10);
      border: 1px solid rgba(255, 255, 255, .16);
      font-size: clamp(11px, 1.1vw, 14px);
      font-weight: 800;
      letter-spacing: .15em;
      text-transform: uppercase;
      backdrop-filter: blur(16px);
      box-shadow: 0 18px 40px rgba(0, 0, 0, .16);
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--pink);
      box-shadow: 0 0 20px var(--pink), 0 0 38px rgba(255, 20, 147, .62);
    }

    h1 {
      font-size: clamp(52px, 7.2vw, 128px);
      line-height: 1.02;
      letter-spacing: .018em;
      text-transform: uppercase;
      text-shadow: 0 26px 70px rgba(0, 0, 0, .38);
    }

    .subtitle {
      display: flex;
      align-items: center;
      gap: 20px;
      color: rgba(255, 255, 255, .82);
      font-size: clamp(18px, 2.2vw, 34px);
      font-weight: 800;
      letter-spacing: .09em;
    }

    .subtitle::before {
      content: "";
      width: clamp(38px, 5vw, 78px);
      height: 4px;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--pink), var(--cyan), var(--violet));
      box-shadow: 0 0 26px rgba(255, 20, 147, .34);
    }

    .controls {
      pointer-events: auto;
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 10px;
      max-width: 430px;
    }

    .control-btn {
      height: 44px;
      border: 1px solid rgba(255, 255, 255, .18);
      border-radius: 999px;
      padding: 0 15px;
      color: #fff;
      background: rgba(255, 255, 255, .11);
      backdrop-filter: blur(16px);
      font-size: 13px;
      font-weight: 800;
      cursor: pointer;
      transition: transform .18s ease, background .18s ease, border-color .18s ease;
    }

    .control-btn:hover {
      transform: translateY(-1px);
      background: rgba(255, 255, 255, .18);
      border-color: rgba(255, 255, 255, .30);
    }

    .control-btn.primary {
      background: linear-gradient(135deg, var(--pink), var(--violet));
      box-shadow: 0 15px 42px rgba(255, 20, 147, .22);
    }

    .hero-phrase {
      position: absolute;
      left: 50%;
      top: 49%;
      z-index: 10;
      width: min(1200px, 88vw);
      transform: translate(-50%, -50%);
      text-align: center;
      pointer-events: none;
    }

    .hero-label {
      margin-bottom: 18px;
      color: rgba(255, 255, 255, .58);
      font-size: clamp(13px, 1.4vw, 19px);
      font-weight: 800;
      letter-spacing: .18em;
      text-transform: uppercase;
    }

    #heroText {
      display: inline;
      font-size: clamp(58px, 8.4vw, 154px);
      line-height: 1.24;
      letter-spacing: .035em;
      font-weight: 950;
      text-transform: uppercase;
      text-wrap: balance;
      background: linear-gradient(90deg, #fff, #dffcff 36%, #ffd3ef 72%, #fff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      filter: drop-shadow(0 30px 44px rgba(0, 0, 0, .38));
      opacity: .94;
    }

    .pulse-ring {
      position: absolute;
      left: 50%;
      top: 52%;
      z-index: 5;
      width: min(64vw, 980px);
      aspect-ratio: 1 / 1;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, .16);
      box-shadow:
        inset 0 0 90px rgba(255, 255, 255, .04),
        0 0 120px rgba(134, 210, 197, .12),
        0 0 160px rgba(255, 20, 147, .11);
      pointer-events: none;
      animation: pulseRing 4.8s ease-in-out infinite;
    }

    @keyframes pulseRing {

      0%,
      100% {
        transform: translate(-50%, -50%) scale(.92);
        opacity: .35;
      }

      50% {
        transform: translate(-50%, -50%) scale(1.05);
        opacity: .76;
      }
    }

    .ribbons {
      position: absolute;
      inset: 0;
      z-index: 8;
      pointer-events: none;
      opacity: 0;
      transition: opacity .65s ease;
    }

    .stage.running .ribbons {
      opacity: 1;
    }

    .marquee-row {
      position: absolute;
      left: -10vw;
      width: 120vw;
      overflow: hidden;
      transform: rotate(var(--angle));
      opacity: var(--opacity);
      filter: drop-shadow(0 12px 26px rgba(0, 0, 0, .18));
    }

    .marquee-track {
      width: max-content;
      display: flex;
      align-items: center;
      gap: 30px;
      animation: runLine var(--duration) linear infinite;
      animation-direction: var(--direction);
      will-change: transform;
    }

    .marquee-row.paused .marquee-track {
      animation-play-state: paused;
    }

    .marquee-chip {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      white-space: nowrap;
      padding: clamp(9px, 1vw, 14px) clamp(14px, 1.6vw, 24px);
      border-radius: 999px;
      background: rgba(255, 255, 255, .12);
      border: 1px solid rgba(255, 255, 255, .18);
      backdrop-filter: blur(14px);
      color: #fff;
      font-size: clamp(16px, 1.6vw, 29px);
      font-weight: 900;
      letter-spacing: .055em;
      line-height: 1.24;
      text-transform: uppercase;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, .20), 0 16px 32px rgba(0, 0, 0, .12);
    }

    .marquee-chip::before {
      content: "";
      width: .52em;
      height: .52em;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 18px var(--accent), 0 0 36px color-mix(in srgb, var(--accent), transparent 40%);
      flex: none;
    }

    @keyframes runLine {
      from {
        transform: translateX(0);
      }

      to {
        transform: translateX(-50%);
      }
    }

    .bubble-layer {
      position: absolute;
      inset: 0;
      z-index: 12;
      pointer-events: none;
    }

    .flying-bubble {
      position: absolute;
      left: var(--x);
      bottom: -18vh;
      max-width: min(620px, 52vw);
      padding: clamp(12px, 1.4vw, 20px) clamp(16px, 1.9vw, 28px);
      border-radius: 28px;
      color: #fff;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, .22), rgba(255, 255, 255, .07)),
        linear-gradient(135deg, var(--accent-a), var(--accent-b));
      border: 1px solid rgba(255, 255, 255, .24);
      box-shadow: 0 28px 60px rgba(0, 0, 0, .22), inset 0 1px 0 rgba(255, 255, 255, .26);
      backdrop-filter: blur(16px);
      font-size: clamp(20px, 2.3vw, 46px);
      line-height: 1.36;
      font-weight: 950;
      letter-spacing: .045em;
      text-transform: uppercase;
      transform: translateX(-50%) rotate(var(--rot));
      animation: flyBubble var(--life) cubic-bezier(.18, .76, .27, 1) forwards;
      will-change: transform, opacity;
    }

    @keyframes flyBubble {
      0% {
        opacity: 0;
        transform: translate3d(-50%, 0, 0) scale(.74) rotate(var(--rot));
        filter: blur(2px);
      }

      10% {
        opacity: .94;
        filter: blur(0);
      }

      74% {
        opacity: .88;
      }

      100% {
        opacity: 0;
        transform: translate3d(calc(-50% + var(--drift)), -124vh, 0) scale(1.12) rotate(calc(var(--rot) * -1));
        filter: blur(.5px);
      }
    }

    .start-screen {
      position: absolute;
      inset: 0;
      z-index: 60;
      display: grid;
      place-items: center;
      padding: 36px;
      background:
        radial-gradient(circle at 44% 38%, rgba(255, 255, 255, .12), transparent 22%),
        radial-gradient(circle at 50% 50%, rgba(38, 38, 74, .26), rgba(7, 8, 24, .84) 65%, rgba(7, 8, 24, .92) 100%);
      backdrop-filter: blur(4px);
      transition: opacity .65s ease, visibility .65s ease;
    }

    .stage.running .start-screen {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .start-card {
      width: min(1100px, 92vw);
      border-radius: 42px;
      padding: clamp(26px, 4.2vw, 68px);
      text-align: center;
      background: linear-gradient(135deg, rgba(255, 255, 255, .18), rgba(255, 255, 255, .07));
      border: 1px solid rgba(255, 255, 255, .18);
      box-shadow: 0 38px 120px rgba(0, 0, 0, .34), inset 0 1px 0 rgba(255, 255, 255, .25);
      overflow: hidden;
      position: relative;
    }

    .start-card::before {
      content: "";
      position: absolute;
      inset: -1px;
      z-index: -1;
      background: linear-gradient(120deg, rgba(255, 20, 147, .34), rgba(134, 210, 197, .18), rgba(171, 104, 226, .34));
      filter: blur(38px);
      opacity: .8;
    }

    .start-card .mini {
      margin-bottom: clamp(30px, 4.2vh, 58px);
      color: rgba(255, 255, 255, .70);
      font-size: clamp(13px, 1.3vw, 18px);
      font-weight: 900;
      letter-spacing: .24em;
      line-height: 1.5;
      text-transform: uppercase;
    }

    .start-card h2 {
      max-width: 1000px;
      margin: 0 auto clamp(26px, 4vh, 58px);
      font-size: clamp(58px, 7.4vw, 138px);
      line-height: 1.06;
      letter-spacing: .012em;
      text-transform: uppercase;
      text-wrap: balance;
    }

    .start-card p {
      max-width: 850px;
      margin: 0 auto 30px;
      color: rgba(255, 255, 255, .76);
      font-size: clamp(18px, 2vw, 30px);
      line-height: 1.18;
      font-weight: 650;
      letter-spacing: -.035em;
    }

    .start-btn {
      margin-top: clamp(34px, 5.6vh, 78px);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      height: clamp(58px, 6vw, 82px);
      padding: 0 clamp(24px, 3vw, 42px);
      border: 0;
      border-radius: 999px;
      color: #fff;
      background: linear-gradient(135deg, var(--pink), var(--violet));
      box-shadow: 0 26px 80px rgba(255, 20, 147, .32), 0 0 0 1px rgba(255, 255, 255, .18) inset;
      font-size: clamp(18px, 2vw, 28px);
      font-weight: 950;
      text-transform: uppercase;
      letter-spacing: .075em;
      cursor: pointer;
      transition: transform .2s ease, filter .2s ease;
    }

    .start-btn:hover {
      transform: translateY(-2px) scale(1.01);
      filter: brightness(1.08);
    }

    .start-btn:active {
      transform: translateY(0) scale(.99);
    }

    .bottom-strip {
      position: absolute;
      left: clamp(20px, 4vw, 70px);
      right: clamp(20px, 4vw, 70px);
      bottom: clamp(18px, 3vh, 38px);
      z-index: 32;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 24px;
      pointer-events: none;
    }

    .counter-card,
    .hint-card {
      border-radius: 22px;
      padding: 16px 18px;
      color: rgba(255, 255, 255, .80);
      background: rgba(255, 255, 255, .10);
      border: 1px solid rgba(255, 255, 255, .16);
      backdrop-filter: blur(16px);
      box-shadow: 0 20px 44px rgba(0, 0, 0, .18);
    }

    .counter-card b {
      display: block;
      color: #fff;
      font-size: clamp(34px, 4vw, 68px);
      line-height: 1.05;
      letter-spacing: .025em;
    }

    .counter-card span,
    .hint-card span {
      display: block;
      font-size: 13px;
      line-height: 1.3;
      letter-spacing: .02em;
    }

    .hint-card {
      max-width: 430px;
      text-align: right;
    }

    .status-light {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      margin-bottom: 7px;
      color: #fff;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: .13em;
      text-transform: uppercase;
    }

    .status-light::before {
      content: "";
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--cyan);
      box-shadow: 0 0 18px var(--cyan), 0 0 36px rgba(134, 210, 197, .42);
      animation: blink 1.4s ease-in-out infinite;
    }

    @keyframes blink {
      50% {
        opacity: .42;
        transform: scale(.75);
      }
    }

    .paused-all .marquee-track,
    .paused-all .stage::before {
      animation-play-state: paused !important;
    }

    .stage:not(.running) .hero-phrase,
    .stage:not(.running) .bottom-strip,
    .stage:not(.running) .controls {
      opacity: .32;
    }

    @media (max-width: 980px) {
      .topbar {
        flex-direction: column;
      }

      .controls {
        justify-content: flex-start;
      }

      .hero-phrase {
        top: 52%;
      }

      .bottom-strip {
        align-items: stretch;
        flex-direction: column;
      }

      .hint-card {
        text-align: left;
        max-width: none;
      }

      .flying-bubble {
        max-width: 78vw;
      }
    }

    @media (prefers-reduced-motion: reduce) {

      *,
      *::before,
      *::after {
        animation-duration: .001ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
      }
    }
  </style>
</head>

<body>
  <main class="stage" id="stage" aria-label="Манифест будущих медиа 2026">
    <canvas id="particleCanvas"></canvas>
    <div class="ambient-shape shape-1"></div>
    <div class="ambient-shape shape-2"></div>
    <div class="ambient-shape shape-3"></div>

    <header class="topbar">
      <section class="brand">
        <div class="kicker"><span class="dot"></span><span>Манифест 2026</span></div>
        <h1>Будущие<br>медиа</h1>
        <div class="subtitle">должны</div>
      </section>
      <nav class="controls" aria-label="Управление потоком">
        <button class="control-btn primary" id="startTopBtn" type="button">Запустить поток</button>
        <button class="control-btn" id="pauseBtn" type="button">Пауза</button>
        <button class="control-btn" id="resetBtn" type="button">Сначала</button>
        <button class="control-btn" id="fullscreenBtn" type="button">Во весь экран</button>
      </nav>
    </header>

    <div class="pulse-ring"></div>

    <section class="hero-phrase" aria-live="polite">
      <div class="hero-label">ответы участников</div>
      <div id="heroText">создавать мы</div>
    </section>

    <section class="ribbons" id="ribbons" aria-hidden="true"></section>
    <section class="bubble-layer" id="bubbleLayer" aria-hidden="true"></section>


    <section class="start-screen" id="startScreen">
      <div class="start-card">
        <div class="mini">Манифест 2026</div>
        <h2>Будущие медиа должны</h2>
        <button class="start-btn" id="startBtn" type="button">↗ Запустить поток</button>
      </div>
    </section>
  </main>

  <script>
    const phrases = [
      "создавать",
      "быть",
      "объединяться",
      "развиваться",
      "не владеть вниманием, а обогащать мышление",
      "быть в моменте",
      "быть про людей",
      "быть яркими",
      "говорить",
      "создаваться нами, а не машиной",
      "должны изменять мир к лучшему и делать его добрее",
      "быть про нас",
      "доносить достоверную информацию",
      "исполнить наши мечты",
      "не стоять на месте",
    ];

    const accents = ["#ff1493", "#86d2c5", "#ab68e2", "#81c4d9", "#ffffff"];
    const gradients = [
      ["rgba(255,20,147,.66)", "rgba(171,104,226,.54)"],
      ["rgba(134,210,197,.56)", "rgba(129,196,217,.50)"],
      ["rgba(171,104,226,.62)", "rgba(38,38,74,.58)"],
      ["rgba(255,255,255,.22)", "rgba(255,20,147,.42)"]
    ];

    const stage = document.getElementById("stage");
    const ribbons = document.getElementById("ribbons");
    const bubbleLayer = document.getElementById("bubbleLayer");
    const heroText = document.getElementById("heroText");
    const startBtn = document.getElementById("startBtn");
    const startTopBtn = document.getElementById("startTopBtn");
    const pauseBtn = document.getElementById("pauseBtn");
    const resetBtn = document.getElementById("resetBtn");
    const fullscreenBtn = document.getElementById("fullscreenBtn");
    const canvas = document.getElementById("particleCanvas");
    const ctx = canvas.getContext("2d", { alpha: true });

    let running = false;
    let paused = false;
    let heroIndex = 0;
    let heroTimer = null;
    let bubbleTimer = null;
    let particleAnimation = null;
    let particles = [];
    let width = 0;
    let height = 0;
    let dpr = 1;


    function random(min, max) { return Math.random() * (max - min) + min; }
    function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

    function buildRibbons() {
      ribbons.innerHTML = "";
      const rowCount = 9;
      const rowPhrases = [...phrases, ...phrases].sort(() => Math.random() - .5);

      for (let i = 0; i < rowCount; i++) {
        const row = document.createElement("div");
        row.className = "marquee-row";
        row.style.top = `${7 + i * 10.8}vh`;
        row.style.setProperty("--angle", `${random(-6, 6)}deg`);
        row.style.setProperty("--duration", `${random(48, 86)}s`);
        row.style.setProperty("--direction", i % 2 ? "reverse" : "normal");
        row.style.setProperty("--opacity", `${random(.36, .86)}`);

        const track = document.createElement("div");
        track.className = "marquee-track";

        const doubled = [...rowPhrases, ...rowPhrases, ...rowPhrases];
        doubled.forEach((phrase, index) => {
          const chip = document.createElement("span");
          chip.className = "marquee-chip";
          chip.textContent = phrase;
          chip.style.setProperty("--accent", accents[(index + i) % accents.length]);
          track.appendChild(chip);
        });

        row.appendChild(track);
        ribbons.appendChild(row);
      }
    }

    function cycleHero() {
      clearInterval(heroTimer);
      heroText.textContent = phrases[heroIndex % phrases.length];
      heroTimer = setInterval(() => {
        if (paused || !running) return;
        heroIndex = (heroIndex + 1) % phrases.length;
        heroText.animate([
          { opacity: 1, transform: "translateY(0) scale(1)", filter: "blur(0)" },
          { opacity: 0, transform: "translateY(-18px) scale(.98)", filter: "blur(6px)" }
        ], { duration: 260, easing: "ease-in", fill: "forwards" }).onfinish = () => {
          heroText.textContent = phrases[heroIndex];
          heroText.animate([
            { opacity: 0, transform: "translateY(18px) scale(.98)", filter: "blur(6px)" },
            { opacity: 1, transform: "translateY(0) scale(1)", filter: "blur(0)" }
          ], { duration: 420, easing: "cubic-bezier(.2,.8,.2,1)", fill: "forwards" });
        };
      }, 1900);
    }

    function spawnBubble() {
      if (!running || paused) return;
      const bubble = document.createElement("div");
      const gradient = pick(gradients);
      const phrase = pick(phrases);
      bubble.className = "flying-bubble";
      bubble.textContent = phrase;
      bubble.style.setProperty("--x", `${random(7, 93)}vw`);
      bubble.style.setProperty("--rot", `${random(-8, 8)}deg`);
      bubble.style.setProperty("--drift", `${random(-26, 26)}vw`);
      bubble.style.setProperty("--life", `${random(11.5, 18)}s`);
      bubble.style.setProperty("--accent-a", gradient[0]);
      bubble.style.setProperty("--accent-b", gradient[1]);
      bubbleLayer.appendChild(bubble);
      bubble.addEventListener("animationend", () => bubble.remove());
    }

    function startBubbleFlow() {
      clearInterval(bubbleTimer);
      for (let i = 0; i < 8; i++) setTimeout(spawnBubble, i * 320);
      bubbleTimer = setInterval(spawnBubble, 760);
    }

    function fitCanvas() {
      dpr = Math.min(window.devicePixelRatio || 1, 1.7);
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = Math.floor(width * dpr);
      canvas.height = Math.floor(height * dpr);
      canvas.style.width = `${width}px`;
      canvas.style.height = `${height}px`;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    function buildParticles() {
      const count = Math.round(Math.min(440, Math.max(180, width * height / 6500)));
      particles = Array.from({ length: count }, () => ({
        x: random(0, width),
        y: random(0, height),
        r: random(.6, 2.8),
        vx: random(-.06, .18),
        vy: random(-.09, .05),
        alpha: random(.10, .70),
        color: pick(["255,20,147", "134,210,197", "171,104,226", "255,255,255", "129,196,217"])
      }));
    }

    function drawParticles() {
      ctx.clearRect(0, 0, width, height);
      ctx.save();
      ctx.globalCompositeOperation = "lighter";
      particles.forEach(p => {
        if (running && !paused) {
          p.x += p.vx;
          p.y += p.vy;
          if (p.x > width + 30) p.x = -30;
          if (p.x < -30) p.x = width + 30;
          if (p.y > height + 30) p.y = -30;
          if (p.y < -30) p.y = height + 30;
        }
        const glow = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r * 7);
        glow.addColorStop(0, `rgba(${p.color}, ${p.alpha})`);
        glow.addColorStop(1, `rgba(${p.color}, 0)`);
        ctx.fillStyle = glow;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r * 7, 0, Math.PI * 2);
        ctx.fill();
      });
      ctx.restore();
      particleAnimation = requestAnimationFrame(drawParticles);
    }

    function startParticles() {
      fitCanvas();
      buildParticles();
      cancelAnimationFrame(particleAnimation);
      particleAnimation = requestAnimationFrame(drawParticles);
    }

    function startFlow() {
      if (!running) {
        running = true;
        stage.classList.add("running");
        stage.classList.remove("paused-all");
        startTopBtn.textContent = "Поток запущен";
        paused = false;
        pauseBtn.textContent = "Пауза";
        buildRibbons();
        cycleHero();
        startBubbleFlow();
        startParticles();
      }
    }

    function pauseFlow() {
      if (!running) return;
      paused = !paused;
      pauseBtn.textContent = paused ? "Продолжить" : "Пауза";
      stage.classList.toggle("paused-all", paused);
      document.querySelectorAll(".marquee-row").forEach(row => row.classList.toggle("paused", paused));
    }

    function resetFlow() {
      running = false;
      paused = false;
      stage.classList.remove("running", "paused-all");
      startTopBtn.textContent = "Запустить поток";
      pauseBtn.textContent = "Пауза";
      heroIndex = 0;
      heroText.textContent = phrases[0];
      clearInterval(heroTimer);
      clearInterval(bubbleTimer);
      bubbleLayer.innerHTML = "";
      ribbons.innerHTML = "";
      startParticles();
    }

    async function toggleFullscreen() {
      try {
        if (!document.fullscreenElement) {
          await document.documentElement.requestFullscreen();
          fullscreenBtn.textContent = "Выйти из полного";
        } else {
          await document.exitFullscreen();
          fullscreenBtn.textContent = "Во весь экран";
        }
      } catch (error) {
        fullscreenBtn.textContent = "Полный экран недоступен";
        setTimeout(() => fullscreenBtn.textContent = "Во весь экран", 1600);
      }
    }

    startBtn.addEventListener("click", startFlow);
    startTopBtn.addEventListener("click", startFlow);
    pauseBtn.addEventListener("click", pauseFlow);
    resetBtn.addEventListener("click", resetFlow);
    fullscreenBtn.addEventListener("click", toggleFullscreen);

    document.addEventListener("keydown", event => {
      if (event.code === "Space") {
        event.preventDefault();
        running ? pauseFlow() : startFlow();
      }
      if (event.key === "Enter") startFlow();
      if (event.key === "Escape" && running) resetFlow();
    });

    window.addEventListener("resize", () => {
      fitCanvas();
      buildParticles();
    });

    document.addEventListener("fullscreenchange", () => {
      fullscreenBtn.textContent = document.fullscreenElement ? "Выйти из полного" : "Во весь экран";
    });

    startParticles();
  </script>
</body>

</html>
